version: '3.8'

services:
  zhiyou-backend:
    build:
      context: ./zhiyou-spring-boot
      dockerfile: Dockerfile
    container_name: zhiyou-backend
    ports:
      - "8004:8004"
    volumes:
      - ./data:/app/data
    environment:
      - SERVER_PORT=8004
      - SPRING_APPLICATION_JSON={"app":{"data-path":"/app/data/"}}
    restart: unless-stopped
    networks:
      - zhiyou-net

  zhiyou-frontend:
    build:
      context: ./zhiyou-vue
      dockerfile: Dockerfile
    container_name: zhiyou-frontend
    ports:
      - "8005:8005"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - zhiyou-backend
    restart: unless-stopped
    networks:
      - zhiyou-net

networks:
  zhiyou-net:
    driver: bridge
